<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanchan &amp; Saurav | Engagement Celebration</title>
  <meta name="description" content="Kanchan and Saurav's engagement celebration invitation">
  <style>
    :root{
      --gold:#b98335;
      --gold-dark:#7f541d;
      --ivory:#fffaf2;
      --ink:#4c3827;
    }

    *{box-sizing:border-box}

    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 12% 7%,rgba(255,255,255,.9),transparent 28%),
        linear-gradient(135deg,#fffaf2,#ead8bb 52%,#fff8eb);
      font-family:Georgia,"Times New Roman",serif;
      color:var(--ink);
    }

    .site{
      width:min(864px,100%);
      margin:0 auto;
      position:relative;
      background:#f5e5cc;
      box-shadow:0 0 56px rgba(79,49,19,.23);
      overflow:hidden;
    }

    .invitation{
      display:block;
      width:100%;
      height:auto;
    }

    /* Clickable areas placed directly over the exact invitation image. */
    .open-button{
      position:absolute;
      left:35%;
      top:30.1%;
      width:30%;
      height:3.2%;
      border:0;
      border-radius:999px;
      background:transparent;
      cursor:pointer;
      z-index:5;
    }

    .open-button:focus-visible{
      outline:3px solid rgba(185,131,53,.6);
      outline-offset:4px;
    }

    /* Real RSVP fields replace the decorative fields printed in the image. */
    .rsvp-form{
      position:absolute;
      left:8.4%;
      top:80.55%;
      width:83.2%;
      height:7.2%;
      display:grid;
      grid-template-columns:1fr 1fr 1.08fr;
      grid-template-rows:54% 36%;
      gap:8% 1.25%;
      z-index:6;
    }

    .field,
    .select,
    .message{
      width:100%;
      min-width:0;
      border:1px solid rgba(183,131,53,.42);
      border-radius:10px;
      background:rgba(255,251,245,.965);
      color:#4a3524;
      padding:0 13px;
      font:600 clamp(10px,1.5vw,15px) Georgia,"Times New Roman",serif;
      outline:none;
      box-shadow:inset 0 1px 2px rgba(91,56,21,.05);
    }

    .field:focus,
    .select:focus,
    .message:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(183,131,53,.15);
    }

    .submit{
      grid-column:1/-1;
      justify-self:center;
      width:30%;
      min-width:155px;
      border:0;
      border-radius:999px;
      color:#553717;
      background:linear-gradient(#efd8a5,#c78e3a);
      font:700 clamp(11px,1.5vw,15px) Georgia,"Times New Roman",serif;
      letter-spacing:.05em;
      cursor:pointer;
      box-shadow:0 5px 13px rgba(96,58,19,.22);
    }

    .status{
      position:absolute;
      left:16%;
      top:88.25%;
      width:68%;
      display:none;
      z-index:8;
      text-align:center;
      padding:10px 14px;
      border-radius:12px;
      font-size:clamp(10px,1.4vw,14px);
    }

    .status.ok{
      display:block;
      background:#eef8ec;
      border:1px solid #b7d7b2;
    }

    .status.err{
      display:block;
      background:#fff0ec;
      border:1px solid #e0b5aa;
    }

    /* Soft opening effect without changing the invitation itself. */
    .veil{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      background:rgba(255,249,239,.72);
      opacity:1;
      transition:opacity .7s ease,visibility .7s ease;
    }

    .veil::before{
      content:"Tap Open Invitation";
      position:absolute;
      left:50%;
      top:31.9%;
      transform:translate(-50%,-50%);
      color:var(--gold-dark);
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:clamp(10px,1.4vw,15px);
      white-space:nowrap;
    }

    .site.open .veil{
      opacity:0;
      visibility:hidden;
    }

    @media(max-width:620px){
      .rsvp-form{
        left:7.5%;
        width:85%;
        top:80.2%;
        height:8.1%;
        grid-template-columns:1fr;
        grid-template-rows:repeat(3,24%) 20%;
        gap:3%;
      }

      .submit{
        grid-column:1;
        width:46%;
        min-width:130px;
      }

      .status{
        top:89.2%;
        left:9%;
        width:82%;
      }
    }
  </style>
</head>
<body>
  <main class="site" id="site">
    <img
      class="invitation"
      src="invitation.png"
      alt="Pearl and gold engagement invitation for Kanchan and Saurav">

    <div class="veil" aria-hidden="true"></div>

    <button
      class="open-button"
      id="openButton"
      type="button"
      aria-label="Open invitation">
    </button>

    <form
      class="rsvp-form"
      id="rsvpForm"
      name="engagement-rsvp"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field">

      <input type="hidden" name="form-name" value="engagement-rsvp">
      <input type="text" name="bot-field" hidden>

      <input
        class="field"
        type="text"
        name="fullName"
        placeholder="Full Name"
        required>

      <select class="select" name="attendance" required>
        <option value="">Will you be attending?</option>
        <option value="Accepted">Joyfully accepts</option>
        <option value="Declined">Regretfully declines</option>
      </select>

      <input
        class="message"
        type="text"
        name="message"
        placeholder="Message (optional)">

      <button class="submit" type="submit">SUBMIT RSVP</button>
    </form>

    <div class="status" id="status" aria-live="polite"></div>
  </main>

  <script>
    const GOOGLE_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

    const site = document.getElementById("site");
    const openButton = document.getElementById("openButton");
    const form = document.getElementById("rsvpForm");
    const statusBox = document.getElementById("status");

    openButton.addEventListener("click", () => {
      site.classList.add("open");

      setTimeout(() => {
        const rsvpTop = site.offsetTop + site.offsetHeight * 0.72;
        window.scrollTo({top:rsvpTop, behavior:"smooth"});
      }, 550);
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const data = new FormData(form);
      const submitButton = form.querySelector(".submit");

      submitButton.disabled = true;
      submitButton.textContent = "SENDING...";

      try{
        await fetch("/", {
          method:"POST",
          headers:{"Content-Type":"application/x-www-form-urlencoded"},
          body:new URLSearchParams(data).toString()
        });

        if(!GOOGLE_SCRIPT_URL.includes("PASTE_YOUR")){
          await fetch(GOOGLE_SCRIPT_URL, {
            method:"POST",
            mode:"no-cors",
            headers:{"Content-Type":"text/plain;charset=utf-8"},
            body:JSON.stringify({
              fullName:data.get("fullName"),
              attendance:data.get("attendance"),
              message:data.get("message") || ""
            })
          });
        }

        form.reset();
        statusBox.className = "status ok";
        statusBox.textContent = "Thank you! Your RSVP has been received.";
      }catch(error){
        statusBox.className = "status err";
        statusBox.textContent = "Something went wrong. Please try again.";
      }finally{
        submitButton.disabled = false;
        submitButton.textContent = "SUBMIT RSVP";
      }
    });
  </script>
</body>
</html>
