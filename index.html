<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4e7d2" />
  <meta name="description" content="Kanchan and Saurav's engagement invitation — November 20, 2026." />
  <title>Kanchan &amp; Saurav — Engagement Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="assets/invitation-cover.png" />
  <link rel="preload" as="image" href="assets/invitation-only.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="cover-screen" id="coverScreen" aria-label="Engagement invitation cover">
      <div class="cover-stage" id="coverStage">
        <img class="cover-art" src="assets/invitation-cover.png" alt="Pearl and flower engagement invitation cover with an ivory envelope and red K and S wax seal" />
        <div class="flap" aria-hidden="true"></div>
        <button class="seal-button" id="sealButton" type="button" aria-label="Tap the K and S wax seal to open the invitation">
          <span class="sr-only">Open invitation</span>
        </button>
      </div>
    </section>

    <section class="invitation-screen" id="invitationScreen" aria-hidden="true">
      <div class="invitation-wrap">
        <img class="invitation-art" src="assets/invitation-only.png" alt="Kanchan and Saurav engagement invitation with event details, photo, gift note, and hashtag" />
        <a class="rsvp-hotspot" href="#reserve" aria-label="Go to the RSVP section"></a>
      </div>

      <section class="reserve-section" id="reserve" aria-labelledby="reserveTitle">
        <div class="reserve-card">
          <p class="reserve-kicker">Kindly RSVP by October 20th, 2026</p>
          <h2 id="reserveTitle">Celebrate With Us</h2>
          <p class="reserve-note">Please submit one response per invited guest. No plus-ones, please.</p>

          <form id="rsvpForm" class="rsvp-form">
            <div class="field full-width">
              <label for="name">Full Name</label>
              <input id="name" type="text" name="name" autocomplete="name" required placeholder="Enter your full name" />
            </div>

            <div class="field full-width">
              <label for="attendance">Will you be attending?</label>
              <select id="attendance" name="attendance" required>
                <option value="" selected disabled>Select your response</option>
                <option value="Yes — attending">Yes, I will be attending</option>
                <option value="No — unable to attend">No, I am unable to attend</option>
              </select>
            </div>

            <div class="field full-width">
              <label for="message">Message <span>(optional)</span></label>
              <textarea id="message" name="message" rows="4" placeholder="Leave a message for Kanchan & Saurav"></textarea>
            </div>

            <button class="submit-rsvp" type="submit">Submit RSVP</button>
            <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>

      <button class="close-invitation" id="closeInvitation" type="button">Return to Envelope</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
